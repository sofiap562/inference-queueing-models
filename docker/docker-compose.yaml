name: triton_test
services:
  triton_server:
    build:
      context: /home/cc/inference-queueing-models
      dockerfile: docker/Dockerfile.triton
    container_name: triton_server
    command: tritonserver --trace-file=/tmp/trace.json --trace-rate=1 --trace-count=20000 --trace-log-frequency=350 --trace-level=TIMESTAMPS --model-repository=/models --model-control-mode=poll --repository-poll-secs=2
    volumes:
      - /home/cc/inference-queueing-models/models:/models # mount models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"  # for HTTP requests
      - "8001:8001"  # for GRPC requests
      - "8002:8002"  # for reporting metrics

  jupyter:
    image: quay.io/jupyter/minimal-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - /home/cc/inference-queueing-models/workspace:/home/jovyan/work # mount workspace
      - /home/cc/inference-queueing-models/models:/home/jovyan/models # mount models
    command: >
      bash -c "python3 -m pip install bash_kernel tritonclient[all] && 
               python3 -m bash_kernel.install && start-notebook.sh"


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
